# Example lab configuration for the netconf execd plugin.
# See the repository README for the full option reference.

[[inputs.netconf]]
  # timeout = "10s"
  # session_max_age = "1h"
  # max_concurrent_devices = 10

  # Lab convenience: skip host key verification. In production set
  # known_hosts_file instead and remove this line.
  insecure_skip_verify = true
  # known_hosts_file = "/etc/telegraf/known_hosts"

  # Devices may also be loaded from a directory of per-device files:
  # devices_directory = "/etc/telegraf/netconf.d"

  [[inputs.netconf.devices]]
    address = "192.168.1.1:830"
    username = "admin"
    password = "password"

  ## OpenConfig interfaces. Validated on Cisco IOS-XR (NCS5500/NCS5700).
  ## Note: on IOS-XR, ietf-interfaces is config-only (no operational counters),
  ## so OpenConfig is the model that actually carries statistics.
  [[inputs.netconf.sensor]]
    rpc = '''
      <get>
        <filter type="subtree">
          <interfaces xmlns="http://openconfig.net/yang/interfaces"/>
        </filter>
      </get>
    '''
    metric_name = "'netconf_interface'"
    metric_selection = "//*[local-name()='interface']"
    [inputs.netconf.sensor.tags]
      interface = "*[local-name()='name']"
    ## Many more counters live under state/counters (in/out unicast/broadcast/
    ## multicast pkts, errors, discards, …); add the ones you need below.
    [inputs.netconf.sensor.fields_int]
      in_octets  = "*[local-name()='state']/*[local-name()='counters']/*[local-name()='in-octets']"
      out_octets = "*[local-name()='state']/*[local-name()='counters']/*[local-name()='out-octets']"
      in_pkts    = "*[local-name()='state']/*[local-name()='counters']/*[local-name()='in-pkts']"
      out_pkts   = "*[local-name()='state']/*[local-name()='counters']/*[local-name()='out-pkts']"
